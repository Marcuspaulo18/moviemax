<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMax - Detalhes do Filme</title>
    <style>
        :root {
            --bg-principal: #0a0a0a;
            --bg-card: #141414;
            --cor-marca: #e50914; /* Vermelho MovieMax */
            --texto-claro: #ffffff;
            --texto-escuro: #757575;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* CONTAINER PRINCIPAL DA PÁGINA */
        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* HEADER / NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 10px;
        }

        .logo {
            color: var(--cor-marca);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* BANNER PRINCIPAL COM GRADIENTE (OVERLAY) */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 520px;
            border-radius: 12px;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            background-image: url(''); /* Injetado pelo JS do TMDB */
            transition: background-image 0.5s ease-in-out;
        }

        /* Botão de fechar/voltar no topo esquerdo do banner */
        .btn-back {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 1.2rem;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(10,10,10,1) 15%, rgba(10,10,10,0.4) 60%, rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 40px;
            width: 100%;
            max-width: 700px;
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        /* METADADOS (NOTA, ANO, GÊNERO) */
        .meta-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .rating-badge {
            color: #ffb400;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag-genero {
            background: rgba(255,255,255,0.15);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* BOTÕES DE CONTROLE STYLE NETFLIX */
        .actions-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-play {
            background-color: var(--cor-marca);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .btn-play:hover {
            transform: scale(1.05);
        }

        .btn-circle {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-circle:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

        .hero-mini-overview {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #eeeeee;
            margin: 0;
        }

        /* SEÇÃO INFERIOR: DUAS COLUNAS ASYMMETRIC */
        .details-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 80px;
            margin-top: 40px;
            padding: 0 5px;
        }

        .col-left h2 {
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        .full-sinopse {
            color: #b3b3b3;
            line-height: 1.7;
            font-size: 1.05rem;
            margin: 0;
        }

        .col-right {
            display: flex;
            flex-direction: column;
            gap: 22px;
            font-size: 0.95rem;
        }

        .info-block-title {
            color: var(--texto-escuro);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-block-value {
            color: #dddddd;
            line-height: 1.4;
        }

        /* SEÇÃO DE RECOMENDADOS (GRID HORIZONTAL DE PÔSTERES) */
        .recommendations-section {
            margin-top: 60px;
            padding: 0 5px;
        }

        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .rec-header h2 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
        }

        .rec-ver-tudo {
            color: var(--cor-marca);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .rec-card {
            background-color: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .rec-card:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .rec-poster {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            background-color: #1f1f1f;
        }

        /* Loader simples para transições */
        .loading-screen {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: var(--bg-principal);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">Carregando catálogo...</div>

    <div class="page-container">

        <nav class="navbar">
            <div class="logo">MOVIEMAX</div>
        </nav>

        <div class="hero-banner" id="filmeBanner">
            <div class="hero-overlay"></div>

            <div class="hero-content">
                <h1 class="hero-title" id="filmeTitulo">---</h1>

                <div class="meta-container">
                    <span class="rating-badge">★ <span id="filmeNota">0.0</span></span>
                    <span id="filmeAno">---</span>
                    <span class="tag-genero" id="filmeTagGenero">---</span>
                </div>

                <div class="actions-bar">
                    <button class="btn-play">▶</button>
                    <button class="btn-circle">+</button>
                    <button class="btn-circle">👍</button>
                </div>

                <p class="hero-mini-overview" id="filmeMiniSinopse">---</p>
            </div>
        </div>

        <div class="details-wrapper">
            <div class="col-left">
                <h2>Sinopse</h2>
                <p class="full-sinopse" id="filmeResumoCompleto">---</p>
            </div>

            <div class="col-right">
                <div>
                    <div class="info-block-title">Direção</div>
                    <div class="info-block-value" id="filmeDiretor">---</div>
                </div>
                <div>
                    <div class="info-block-title">Elenco</div>
                    <div class="info-block-value" id="filmeElenco">---</div>
                </div>
                <div>
                    <div class="info-block-title">Gênero</div>
                    <div class="info-block-value" id="filmeListaGeneros">---</div>
                </div>
                <div>
                    <div class="info-block-title">Duração</div>
                    <div class="info-block-value" id="filmeDuracao">---</div>
                </div>
                <div>
                    <div class="info-block-title">Ano</div>
                    <div class="info-block-value" id="filmeFichaAno">---</div>
                </div>
            </div>
        </div>

        <div class="recommendations-section">
            <div class="rec-header">
                <h2>Recomendados para você</h2>
                <a href="http://127.0.0.1:8000/portalfilmes/" class="rec-ver-tudo">Ver tudo</a>
            </div>
            <div class="recommendations-grid" id="containerRecomendados">
                </div>
        </div>

    </div>

    <script>
    const APIURL = 'http://127.0.0.1:8000/apirecomenda/filme/?idefilme=';
    const TMDB_API_KEY = '0952ce440e4c723a2cc5b6c3df8c6c27';
    const TMDB_BASE_URL = 'https://api.themoviedb.org/3/movie/';
    const TMDB_BACKDROP_W1280 = 'https://image.tmdb.org/t/p/w1280';
    const TMDB_POSTER_W500 = 'https://image.tmdb.org/t/p/w500';

    function voltarPagina() {
        window.history.back();
    }

    async function obterImagensDoTMDB(idefilme) {
        try {
            const resposta = await fetch(`${TMDB_BASE_URL}${idefilme}?api_key=${TMDB_API_KEY}`);
            if (resposta.ok) {
                const tmdbData = await resposta.json();
                return {
                    backdrop: tmdbData.backdrop_path ? `${TMDB_BACKDROP_W1280}${tmdbData.backdrop_path}` : '',
                    poster: tmdbData.poster_path ? `${TMDB_POSTER_W500}${tmdbData.poster_path}` : ''
                };
            }
        } catch (err) {
            console.error("Não foi possível carregar as imagens do TMDB para o id " + idefilme, err);
        }
        return { backdrop: '', poster: '' };
    }

    async function carregarPaginaFilme(ideFilme, mudarUrlNoHistorico = false) {
        try {
            document.getElementById('loader').style.opacity = '1';
            document.getElementById('loader').style.display = 'flex';

            if (mudarUrlNoHistorico) {
                const novaUrl = `${window.location.pathname}?idefilme=${ideFilme}`;
                window.history.pushState({ path: novaUrl }, '', novaUrl);
            }

            const response = await fetch(`${APIURL}${ideFilme}`);
            if (!response.ok) {
                document.getElementById('loader').innerText = "Filme não encontrado na base de dados.";
                return;
            }
            const dadosFilmeLocal = await response.json();

            const imagensTMDB = await obterImagensDoTMDB(ideFilme);

            const banner = document.getElementById('filmeBanner');
            if (imagensTMDB.backdrop) {
                banner.style.backgroundImage = `url('${imagensTMDB.backdrop}')`;
            } else {
                banner.style.backgroundImage = `linear-gradient(45deg, #111, #222)`;
            }

            document.getElementById('filmeTitulo').innerText = dadosFilmeLocal.titulo;
            document.getElementById('filmeNota').innerText = dadosFilmeLocal.notamedia.toFixed(1);

            const anoFilme = dadosFilmeLocal.datalancamento ? dadosFilmeLocal.datalancamento.substring(0, 4) : "----";
            document.getElementById('filmeAno').innerText = anoFilme;
            document.getElementById('filmeFichaAno').innerText = anoFilme;

            document.getElementById('filmeTagGenero').innerText = dadosFilmeLocal.generos.split(',')[0].trim();

            document.getElementById('filmeMiniSinopse').innerText = dadosFilmeLocal.resumo ? dadosFilmeLocal.resumo.substring(0, 140) + "..." : "Sem resumo.";

            document.getElementById('filmeResumoCompleto').innerText = dadosFilmeLocal.resumo || "Sinopse indisponível.";
            document.getElementById('filmeDiretor').innerText = dadosFilmeLocal.diretor;
            document.getElementById('filmeElenco').innerText = dadosFilmeLocal.elenco;
            document.getElementById('filmeListaGeneros').innerText = dadosFilmeLocal.generos;
            document.getElementById('filmeDuracao').innerText = dadosFilmeLocal.tempoduracao;

            const containerRec = document.getElementById('containerRecomendados');
            containerRec.innerHTML = ''; // Limpa os anteriores


            const promessasDeCards = dadosFilmeLocal.recomendados.map(async (rec) => {
                const imgRec = await obterImagensDoTMDB(rec.idefilme);
                const urlPosterReal = imgRec.poster || 'https://via.placeholder.com/300x450?text=Sem+Imagem';


                return `
                    <div class="rec-card" onclick="carregarPaginaFilme(${rec.idefilme}, true)">
                        <div class="rec-poster" style="background-image: url('${urlPosterReal}');"></div>
                        <p style="padding: 12px 10px 5px 10px; margin: 0; font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${rec.titulo}">
                            ${rec.titulo}
                        </p>
                    </div>
                `;
            });

            // Resolve todos os pôsteres e joga na tela de uma vez só
            const htmlGerado = await Promise.all(promessasDeCards);
            containerRec.innerHTML = htmlGerado.join('');

            // Esconde a tela de carregamento e joga o usuário suavemente pro topo
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (error) {
            console.error("Erro no fluxo do ecossistema de mídias:", error);
            document.getElementById('loader').innerText = "Erro ao carregar o filme.";
        }
    }


    const urlParams = new URLSearchParams(window.location.search);
    const idefilme = urlParams.get('idefilme');

    if (idefilme) {
        // Agora a função já existe fisicamente na memória e vai rodar perfeitamente!
        carregarPaginaFilme(idefilme, false);
    } else {
        alert("Nenhum ID de filme foi fornecido na URL.");
    }
    </script>
</body>
</html>
